name: Release

# Publishes to PyPI (trusted publishing) and npm when a version tag is pushed.
# Usage: bump versions in pyproject.toml + packaging/npm/package.json, then
#   git tag v1.1.0 && git push origin v1.1.0

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag must match pyproject.toml and package.json versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PY_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          NPM_VERSION=$(node -p "require('./packaging/npm/package.json').version")
          echo "tag=$TAG pyproject=$PY_VERSION npm=$NPM_VERSION"
          [ "$TAG" = "$PY_VERSION" ] && [ "$TAG" = "$NPM_VERSION" ]

  test:
    needs: check-versions
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest

  publish-pypi:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # PyPI trusted publishing (OIDC) — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Tolerate re-runs after a partial release: skip files PyPI
          # already has instead of failing the whole pipeline.
          skip-existing: true

  publish-npm:
    # npm wrapper pip-installs portslayer==<version>, so PyPI must go first
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish to npm
        working-directory: packaging/npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    needs: [publish-pypi, publish-npm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        # Tolerate re-runs: skip creation if the release already exists.
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "PortSlayer $GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}
